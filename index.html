<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">

</div>
</div>

<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>

<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">

                    Login

</button>

<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibilityIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        }

        // Lightweight Micro-interaction for form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span> Authenticating...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            setTimeout(() => {
                // Simulate a subtle error for demonstration if empty, or redirect
                if(!document.getElementById('studentId').value) {
                    btn.innerHTML = 'Login';
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                    alert('Please enter your Student ID to proceed.');
                } else {
                    btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Welcome';
                    setTimeout(() => window.location.href = 'dashboard.html', 500);
                }
            }, 1500);
        });
    </script>
